spring.application.name=atena_events

# Reverse proxy (Caddy) — usa X-Forwarded-Proto/Host para montar URLs corretas (OAuth2 redirect_uri)
# 'framework' usa o ForwardedHeaderFilter do Spring, que processa tanto X-Forwarded-Proto quanto X-Forwarded-Host
server.forward-headers-strategy=framework


spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration-ms=900000
jwt.guest-token-expiration-ms=7200000

# OAuth2 (populated via env vars; placeholders prevent startup failure when not set)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:disabled}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:disabled}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${API_URL}/login/oauth2/code/google

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:disabled}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:disabled}
spring.security.oauth2.client.registration.github.scope=user:email
spring.security.oauth2.client.registration.github.redirect-uri=${API_URL}/login/oauth2/code/github

app.frontend-url=${FRONTEND_URL}

# Email — MailHog em dev/docker (sem auth). Em produção, sobrescreva MAIL_* para um SMTP real.
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
app.mail.from=${MAIL_FROM:no-reply@atenaevents.local}

# Validade dos tokens de reset/troca de email (minutos)
app.security.reset-token-expiration-minutes=30
